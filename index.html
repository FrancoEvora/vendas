    function playbookForLead(lead){
      const stage = lead.stage;
      const actions=[];
      if(['lead','pre-atendimento','qualificacao'].includes(stage)) actions.push('Validar origem, campanha, finalidade, perfil do comprador e orçamento disponível.');
      if(['lead','pre-atendimento','qualificacao','aquecimento'].includes(stage)) actions.push('Perguntar explicitamente se o lead deseja receber book, mapa, tabela ou vídeo do empreendimento.');
      if(['qualificacao','aquecimento','atendimento'].includes(stage)) actions.push('Classificar o lead como A/B/C/D com base em entrada, urgência, decisor e aceitação de IPCA + juros.');
      if(['atendimento','simulacao','proposta'].includes(stage)) actions.push('Conduzir a simulação, revisar objeções e preparar proposta dentro da política comercial.');
      if(['prioridade','pre-reserva'].includes(stage)) actions.push('Confirmar lote de interesse, prazo de bloqueio e próximos passos para contrato.');
      if(['contrato'].includes(stage)) actions.push('Conferir dados cadastrais completos do comprador e eventual cônjuge antes do envio.');
      if(['entrada-paga','carteira'].includes(stage)) actions.push('Acionar pós-venda, enviar boas-vindas e iniciar acompanhamento preventivo da carteira.');
      const missing = [];
      if(!lead.materialOfferAsked) missing.push('Oferta de materiais de marketing ainda não registrada.');
      if(!lead.entryReady) missing.push('Validar capacidade de entrada.');
      if(!lead.understandsIndex) missing.push('Explicar IPCA + juros remuneratórios.');
      return {actions, missing};
    }

    function simulatePlan(price, entryPct, monthlyCount, annualCount, interestMonthly, annualRatio){
      const entry = price * (entryPct/100);
      const balance = price - entry;
      const i = (Number(interestMonthly)||0)/100;
      const n = Number(monthlyCount)||180;
      const aCount = Number(annualCount)||15;
      const ratio = Number(annualRatio)||28.35;
      let monthly = 0, annual = 0;
      if(i>0){
        const pvMonthly = (1 - Math.pow(1+i, -n))/i;
        let pvAnnual = 0; for(let k=1;k<=aCount;k++) pvAnnual += Math.pow(1+i, -12*k);
        monthly = balance / (pvMonthly + ratio * pvAnnual);
        annual = ratio * monthly;
      } else {
        monthly = balance * 0.297 / n;
        annual = balance * 0.703 / aCount;
      }
      const totalNominal = entry + monthly*n + annual*aCount;
      const realGain = totalNominal - price;
      return {entry, balance, monthly, annual, totalNominal, realGain};
    }

        const mine = leads.filter(l=>l.sdrId===sdr.id);

      }).join('');
      return `<div class="grid three"><div class="card"><h3>Fila SDR</h3><p>${leads.length} leads em pré-atendimento, qualificação ou aquecimento.</p></div><div class="card"><h3>Ações vencidas</h3><p>${unworked.length} leads precisam de retomada imediata.</p></div><div class="card"><h3>Oferta de materiais</h3><p>${materialsPending.length} leads ainda sem registro de oferta de material.</p></div></div><div class="card" style="margin-top:16px"><h3>Roteiro de condução SDR</h3><ul class="guideList"><li>Responder rápido e confirmar origem/campanha.</li><li>Validar finalidade, perfil do comprador e capacidade de entrada.</li><li>Perguntar se deseja receber book, mapa, vídeo ou tabela.</li><li>Classificar A/B/C/D com base em entrada, decisor, prazo e aceitação da condição.</li><li>Entregar ao corretor somente quando houver oportunidade real.</li></ul></div><div class="grid two" style="margin-top:16px">${cards}</div>`;
    }

    function renderCorretorPanel(){
      const corretores = projectTeam('Corretor');
      const activeStages = ['atendimento','simulacao','proposta','prioridade','pre-reserva','contrato'];
      const leads = projectLeads().filter(l=>activeStages.includes(l.stage));
      const proposals = projectProposals();
      const cards = corretores.map(cor=>{
        const mine = leads.filter(l=>l.corretorId===cor.id);
        const props = proposals.filter(p=>p.createdBy===cor.id || (leadById(p.leadId)&&leadById(p.leadId).corretorId===cor.id));
        return `<div class="card"><div class="roleHeader"><div><h3>${escapeHTML(cor.name)}</h3><p>${escapeHTML(cor.squad||'Corretor')} · ${escapeHTML(cor.creci||'')}</p></div><span class="pill mint">${mine.length} clientes</span></div><div class="grid three" style="margin-bottom:12px"><div class="miniStat"><span>Propostas</span><b>${props.length}</b></div><div class="miniStat"><span>Prioridade+</span><b>${mine.filter(l=>stageIndex(l.stage)>=stageIndex('prioridade')).length}</b></div><div class="miniStat"><span>Contratos</span><b>${mine.filter(l=>l.stage==='contrato').length}</b></div></div>${mine.slice(0,6).map(l=>`<div class="taskCard"><b>${escapeHTML(l.name)}</b><span class="tiny">${escapeHTML(getStage(l.stage).short)} · ${escapeHTML(l.desiredLotProfile||'perfil de lote não definido')}</span><p class="tiny" style="margin-top:6px">${escapeHTML(leadTaskText(l))}</p><div class="taskMeta"><button class="btn small" onclick="openLead('${l.id}')">Abrir</button><button class="btn small" onclick="openProposalForm('${l.id}')">Proposta</button>${l.linkedLotId?`<button class="btn small" onclick="openLot('${l.linkedLotId}')">Lote</button>`:''}<button class="btn small success" onclick="advanceLead('${l.id}')">Avançar</button></div></div>`).join('') || '<div class="empty">Sem clientes ativos.</div>'}</div>`;
      }).join('');
      return `<div class="grid three"><div class="card"><h3>Carteira consultiva</h3><p>${leads.length} clientes em atendimento, simulação, proposta, prioridade ou reserva.</p></div><div class="card"><h3>Propostas abertas</h3><p>${proposals.filter(p=>!['convertida','recusada'].includes(p.status)).length} propostas exigem acompanhamento.</p></div><div class="card"><h3>Reservas e contratos</h3><p>${leads.filter(l=>['pre-reserva','contrato'].includes(l.stage)).length} clientes em fechamento.</p></div></div><div class="card" style="margin-top:16px"><h3>Roteiro de condução do corretor</h3><ul class="guideList"><li>Retomar o histórico já qualificado pelo SDR antes da reunião.</li><li>Defender valor antes de discutir condição financeira.</li><li>Conectar perfil do cliente ao lote mais adequado.</li><li>Registrar proposta, aprovação e validade no sistema.</li><li>Conferir dados cadastrais antes de pedir contrato ao jurídico.</li></ul></div><div class="grid two" style="margin-top:16px">${cards}</div>`;
    }

    function proposalApprovalLevel(p){
      if((p.discountPct||0)>5) return 'Diretor Comercial';
      if(p.status==='em-aprovacao') return 'Gestor Comercial';
      if(['aprovada','aceita','convertida'].includes(p.status)) return 'Aprovado';
      return 'Corretor';
    }
    function renderAprovacoes(){
      const props = projectProposals();
      const rows = props.map(p=>{
        const lead=leadById(p.leadId), lot=lotById(p.lotId);
        const flow = `<div class="approvalFlow"><span class="approvalStep done">Corretor</span><span class="approvalStep ${['em-aprovacao','aprovada','aceita','convertida'].includes(p.status)?'done':'warn'}">Gestor</span><span class="approvalStep ${(p.discountPct||0)>5?'warn':'done'}">Diretor</span><span class="approvalStep ${['aceita','convertida'].includes(p.status)?'done':'warn'}">Cliente</span></div>`;
        return `<tr><td><b>${escapeHTML(lead?lead.name:'—')}</b><div class="tiny">${escapeHTML(lot?lotName(lot.id):'—')}</div></td><td>${flow}</td><td><span class="pill ${statusPill(p.status)}">${proposalStatusLabel(p.status)}</span><div class="tiny">Alçada atual: ${escapeHTML(proposalApprovalLevel(p))}</div></td><td>${fmtMoney(p.totalNominal)}</td><td>${fmtDate(p.expiresAt)}</td><td><div class="actions"><button class="btn small" onclick="openProposal('${p.id}')">Abrir</button>${p.status==='em-aprovacao'?`<button class="btn small success" onclick="approveProposal('${p.id}')">Aprovar</button><button class="btn small danger" onclick="rejectProposal('${p.id}')">Recusar</button>`:''}</div></td></tr>`;
      }).join('') || `<tr><td colspan="6" class="muted">Nenhuma proposta cadastrada.</td></tr>`;
      return `<div class="card"><h3>Esteira de aprovações</h3><p>Use esta área para controlar propostas, alçadas, validade e aceite antes da conversão em contrato.</p><div class="tableWrap" style="margin-top:12px"><table><thead><tr><th>Cliente/Lote</th><th>Fluxo</th><th>Status/Alçada</th><th>Total</th><th>Validade</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }

    function renderLeadChecklist(lead){
      const missing = contractPendencies(lead);
      const items = [
        ['Dados comprador', !missing.includes('CPF/CNPJ do comprador') && !!lead.phone && !!lead.email],
        ['Finalidade e perfil definidos', !!lead.purposeId && !!lead.buyerProfileId],
        ['Condição entendida', !!lead.understandsIndex && !!lead.acceptsAnnuals],
        ['Entrada validada', !!lead.entryReady],
        ['Materiais ofertados', !!lead.materialOfferAsked],
        ['Cônjuge validado quando aplicável', !missing.some(x=>x.includes('cônjuge'))],
        ['Lote vinculado quando em prioridade/reserva', stageIndex(lead.stage)<stageIndex('prioridade') || !!lead.linkedLotId]
      ];
      return items.map(([label,ok])=>`<div class="checkItem"><span class="checkIcon ${ok?'ok':'warn'}">${ok?'✓':'!'}</span><div><b>${escapeHTML(label)}</b><div class="tiny">${ok?'Concluído':'Pendente ou exige conferência'}</div></div></div>`).join('');
    }
    function renderChecklists(){
      const leads = projectLeads().filter(l=>stageIndex(l.stage)>=stageIndex('proposta')).sort((a,b)=>stageIndex(b.stage)-stageIndex(a.stage));
      const cards = leads.map(l=>{
        const pend=contractPendencies(l);
        return `<div class="card"><div class="roleHeader"><div><h3>${escapeHTML(l.name)}</h3><p>${escapeHTML(getStage(l.stage).label)} · ${escapeHTML(teamName(l.corretorId)||'sem corretor')}</p></div><span class="pill ${pend.length?'amber':'green'}">${pend.length?'Pendente':'Pronto'}</span></div>${renderLeadChecklist(l)}<div class="actions" style="justify-content:flex-start;margin-top:10px"><button class="btn small" onclick="openLead('${l.id}')">Abrir ficha</button>${l.linkedLotId?`<button class="btn small" onclick="openLot('${l.linkedLotId}')">Abrir lote</button>`:''}</div></div>`;
      }).join('') || '<div class="empty">Nenhum cliente em proposta ou fechamento.</div>';
      const contracts = projectContracts();
      const contractRows = contracts.map(c=>{
        const lead=leadById(c.leadId), prop=state.proposals.find(p=>p.id===c.proposalId);
        const entry=state.payments.find(p=>p.contractId===c.id && p.type==='entrada');
        return `<tr><td><b>${escapeHTML(lead?lead.name:'—')}</b><div class="tiny">${escapeHTML(lotName(c.lotId))}</div></td><td><span class="pill ${c.signedAt?'green':'amber'}">${c.signedAt?'Assinado':'Aguardando assinatura'}</span></td><td><span class="pill ${entry&&entry.status==='recebido'?'green':'amber'}">${entry&&entry.status==='recebido'?'Entrada paga':'Entrada pendente'}</span></td><td>${prop?fmtMoney(prop.totalNominal):'—'}</td><td><button class="btn small" onclick="openContract('${c.id}')">Contrato</button></td></tr>`;
      }).join('') || '<tr><td colspan="5" class="muted">Nenhum contrato gerado.</td></tr>';
      return `<div class="grid three"><div class="card"><h3>Prontidão jurídica</h3><p>Clientes em proposta/fechamento com checklist cadastral.</p></div><div class="card"><h3>Financeiro inicial</h3><p>Contrato só vira carteira após entrada paga.</p></div><div class="card"><h3>Bloqueios de lote</h3><p>Prioridade e reserva precisam de lead, corretor, SDR e prazo.</p></div></div><div class="grid two" style="margin-top:16px">${cards}</div><div class="card" style="margin-top:16px"><h3>Contratos e entrada</h3><div class="tableWrap"><table><thead><tr><th>Cliente/Lote</th><th>Contrato</th><th>Entrada</th><th>Carteira</th><th>Ações</th></tr></thead><tbody>${contractRows}</tbody></table></div></div>`;
    }


    function renderLeads(){
      const leads = projectLeads().filter(l=>{
        const q = filters.leadSearch.toLowerCase();
        const okSearch = !q || [l.name,l.phone,l.city,l.finalidade,l.desiredLotProfile,l.buyerProfile,campaignName(l.campaignId),teamName(l.sdrId),teamName(l.corretorId),originName(l.originId)].join(' ').toLowerCase().includes(q);
        const okStage = filters.leadStage==='all' || l.stage===filters.leadStage;
        return okSearch && okStage;
      });
      const rows = leads.map(l=>leadRow(l)).join('') || `<tr><td colspan="9" class="muted">Nenhum lead encontrado.</td></tr>`;
      return `<div class="card"><div class="lotToolbar"><input style="min-width:260px" placeholder="Buscar lead, cidade, SDR, corretor..." value="${escapeHTML(filters.leadSearch)}" oninput="setFilter('leadSearch',this.value)"><select onchange="setFilter('leadStage',this.value)"><option value="all">Todas as etapas</option>${STAGES.map(s=>`<option value="${s.id}" ${filters.leadStage===s.id?'selected':''}>${escapeHTML(s.label)}</option>`).join('')}</select><button class="btn primary" onclick="openLeadForm()">+ Novo lead</button></div><div class="tableWrap"><table><thead><tr><th>Lead</th><th>Origem</th><th>Cidade</th><th>Trilha</th><th>Score</th><th>SDR</th><th>Corretor</th><th>Lote</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
    
    function leadRow(l){ const t=temp(l.score); return `<tr><td><div class="leadName">${escapeHTML(l.name)}</div><div class="tiny">${escapeHTML(l.phone)} · ${escapeHTML(l.email||'')}</div></td><td>${escapeHTML(originName(l.originId))}<div class="tiny">${escapeHTML(campaignName(l.campaignId)||l.campaign||'')}</div></td><td>${escapeHTML(l.city)}/${escapeHTML(l.uf||'SP')}<div class="tiny">${escapeHTML(purposeName(l.purposeId)||l.finalidade||'')} · ${escapeHTML(buyerProfileName(l.buyerProfileId)||l.buyerProfile||'')}</div></td><td><b>${escapeHTML(getStage(l.stage).short)}</b><div class="barWrap" style="margin-top:6px"><div class="bar" style="width:${progressOf(l.stage)}%"></div></div><div class="tiny">${progressOf(l.stage)}% · dono: ${escapeHTML(ownerName(l))}</div></td><td><span class="pill ${t.cls}">Cliente ${t.label} · ${l.score}</span></td><td>${escapeHTML(teamName(l.sdrId))}</td><td>${escapeHTML(teamName(l.corretorId))}</td><td>${l.linkedLotId?`<button class="btn small" onclick="openLot('${l.linkedLotId}')">${escapeHTML(lotName(l.linkedLotId))}</button>`:'—'}</td><td><div class="actions"><button class="btn small" onclick="openLead('${l.id}')">Abrir</button><button class="btn small success" onclick="advanceLead('${l.id}')">Avançar</button></div></td></tr>`; }
    function ownerName(l){ const owner = getStage(l.stage).owner; if(owner==='SDR') return teamName(l.sdrId); if(owner==='Corretor') return teamName(l.corretorId); if(owner==='Gestor Comercial') return teamName(currentProject().managerId); if(owner==='Diretor Comercial') return teamName(currentProject().directorId); const person = projectTeam(owner)[0]; return person ? person.name : owner; }

    function renderFunil(){
      const grouped = STAGES.map(s=>[s, projectLeads().filter(l=>l.stage===s.id)]);
      return `<div class="kanban">${grouped.map(([s,leads])=>`<div class="lane"><div class="laneHead"><h4>${escapeHTML(s.short)}</h4><span>${leads.length}</span></div>${leads.map(l=>leadCard(l)).join('') || '<div class="empty">Sem leads</div>'}</div>`).join('')}</div>`;
    }
    function leadCard(l){ const t=temp(l.score); return `<div class="leadCard"><div class="leadName">${escapeHTML(l.name)}</div><div class="tiny">${escapeHTML(l.city)}/${escapeHTML(l.uf)} · ${escapeHTML(originName(l.originId))}</div><div class="meta"><span class="pill ${t.cls}">${t.label} · ${l.score}</span><span class="pill mint">${escapeHTML(ownerName(l))}</span></div><div class="trail">${STAGES.map((s,i)=>`<div class="trailDot ${i<=stageIndex(l.stage)?'done':''} ${i===stageIndex(l.stage)?'current':''}"></div>`).join('')}</div><div class="progressLabel">${progressOf(l.stage)}% · ${escapeHTML(getStage(l.stage).label)}</div><div class="actions" style="justify-content:flex-start;margin-top:9px"><button class="btn small" onclick="openLead('${l.id}')">Abrir</button><button class="btn small success" onclick="advanceLead('${l.id}')">Avançar</button></div></div>`; }

    function renderMapa(){
      const lots = projectLots().filter(l=> (filters.lotStatus==='all'||l.status===filters.lotStatus) && (filters.lotQuadra==='all'||l.quadra===filters.lotQuadra));
      const quadras = [...new Set(projectLots().map(l=>l.quadra))];
      return `<div class="card"><div class="lotToolbar"><select onchange="setFilter('lotStatus',this.value)"><option value="all">Todos os status</option>${LOT_STATUS.map(s=>`<option value="${s}" ${filters.lotStatus===s?'selected':''}>${lotStatusLabel(s)}</option>`).join('')}</select><select onchange="setFilter('lotQuadra',this.value)"><option value="all">Todas as quadras</option>${quadras.map(q=>`<option value="${q}" ${filters.lotQuadra===q?'selected':''}>${q}</option>`).join('')}</select><span class="pill mint">${lots.length} lotes exibidos</span></div><div class="lotGrid">${lots.map(lotTile).join('')}</div></div>`;
    }
    function lotTile(l){ return `<button class="lot ${l.status}" onclick="openLot('${l.id}')"><b>${escapeHTML(l.quadra)}-${escapeHTML(l.numero)}</b><small>${escapeHTML(l.tipo)} · ${escapeHTML(l.sector)}<br>${l.area} m² · ${fmtMoney(l.precoBase)}<br>${l.leadId?'Lead: '+escapeHTML(leadName(l.leadId)):'Sem vínculo'}</small><span class="lotStatus">${lotStatusLabel(l.status)}</span></button>`; }

    function renderPropostas(){
      const rows = projectProposals().map(p=>{ const lead=leadById(p.leadId), lot=lotById(p.lotId); return `<tr><td><b>${escapeHTML(lead?lead.name:'—')}</b><div class="tiny">${escapeHTML(lot?lotName(lot.id):'—')}</div></td><td><span class="pill ${statusPill(p.status)}">${proposalStatusLabel(p.status)}</span></td><td>${fmtMoney(p.price)}</td><td>${fmtMoney(p.entryValue)}<div class="tiny">${p.entryPct}%</div></td><td>${p.monthlyCount}x ${fmtMoney(p.monthlyValue)}</td><td>${p.annualCount}x ${fmtMoney(p.annualValue)}</td><td>${escapeHTML(p.indexLabel)} + ${String(p.interestMonthly).replace('.',',')}% a.m.</td><td>${fmtMoney(p.totalNominal)}</td><td><div class="actions"><button class="btn small" onclick="openProposal('${p.id}')">Abrir</button>${proposalActions(p)}</div></td></tr>`; }).join('') || `<tr><td colspan="9" class="muted">Nenhuma proposta neste empreendimento.</td></tr>`;
      return `<div class="card"><div class="actions" style="justify-content:flex-start;margin-bottom:12px"><button class="btn primary" onclick="openProposalForm()">+ Nova proposta</button><span class="pill mint">Alçadas: Corretor → Gestor → Diretor</span></div><div class="tableWrap"><table><thead><tr><th>Cliente/Lote</th><th>Status</th><th>Preço</th><th>Entrada</th><th>Mensais</th><th>Anuais</th><th>Condição</th><th>Total nominal</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }
    function proposalActions(p){
      if(p.status==='em-aprovacao') return `<button class="btn small success" onclick="approveProposal('${p.id}')">Aprovar</button><button class="btn small danger" onclick="rejectProposal('${p.id}')">Recusar</button>`;
      if(p.status==='aprovada' || p.status==='enviada') return `<button class="btn small success" onclick="acceptProposal('${p.id}')">Aceite</button>`;
      if(p.status==='aceita') return `<button class="btn small primary" onclick="convertProposal('${p.id}')">Contrato</button>`;
      return '';
    }

    function renderContratos(){
      const rows = projectContracts().map(c=>{ const lead=leadById(c.leadId), lot=lotById(c.lotId), prop=state.proposals.find(p=>p.id===c.proposalId); return `<tr><td><b>${escapeHTML(lead?lead.name:'—')}</b><div class="tiny">${escapeHTML(lot?lotName(lot.id):'—')}</div></td><td><span class="pill ${c.status==='contrato-assinado'?'green':'blue'}">${escapeHTML(c.status)}</span></td><td>${fmtDateTime(c.generatedAt)}</td><td>${c.signedAt?fmtDateTime(c.signedAt):'—'}</td><td>${prop?fmtMoney(prop.totalNominal):'—'}</td><td><div class="actions"><button class="btn small" onclick="openContract('${c.id}')">Ver contrato</button>${c.status!=='contrato-assinado'?`<button class="btn small success" onclick="signContract('${c.id}')">Assinar demo</button>`:''}</div></td></tr>`; }).join('') || `<tr><td colspan="6" class="muted">Nenhum contrato gerado.</td></tr>`;
      return `<div class="grid two"><div class="card"><h3>Contratos gerados</h3><div class="tableWrap"><table><thead><tr><th>Cliente/Lote</th><th>Status</th><th>Gerado em</th><th>Assinado em</th><th>Valor</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="card"><h3>Modelo contratual ativo</h3>${renderContractTemplateEditor()}</div></div>`;
    }
    function renderContractTemplateEditor(){ const t=state.contractTemplates[0]; return `<p>Modelo demonstrativo com variáveis. Em produção, a minuta oficial deve ser validada pelo jurídico.</p><div class="field" style="margin-top:12px"><label>Nome</label><input id="contractTplName" value="${escapeHTML(t.name)}"></div><div class="field" style="margin-top:12px"><label>Texto do modelo</label><textarea id="contractTplBody" style="min-height:330px">${escapeHTML(t.body)}</textarea></div><button class="btn primary" style="margin-top:12px" onclick="saveContractTemplate()">Salvar modelo</button>`; }

    function renderFinanceiro(){
      const pays = projectPayments().map(p=>({...p, computed:paymentStatus(p)}));
      const filtered = pays.filter(p=>filters.financeStatus==='all' || p.computed===filters.financeStatus);
      const received = pays.filter(p=>p.status==='recebido').reduce((s,p)=>s+p.amount,0);
      const due = pays.filter(p=>p.status!=='recebido').reduce((s,p)=>s+p.amount,0);
      const overdue = pays.filter(p=>p.computed==='vencido').reduce((s,p)=>s+p.amount,0);
      const rows = filtered.slice(0,300).map(p=>`<tr><td>${escapeHTML(leadName(p.leadId))}<div class="tiny">${escapeHTML(lotName(p.lotId))}</div></td><td>${escapeHTML(p.type)} ${p.parcel}</td><td>${fmtDate(p.dueDate)}</td><td>${fmtMoney(p.amount)}</td><td><span class="pill ${statusPill(p.computed)}">${p.computed.replace('-',' ')}</span></td><td>${p.paidAt?fmtDateTime(p.paidAt):'—'}</td><td><div class="actions"><button class="btn small" onclick="mockSendBoleto('${p.id}')">Enviar boleto</button>${p.status!=='recebido'?`<button class="btn small success" onclick="markPaymentPaid('${p.id}')">Baixar</button>`:''}</div></td></tr>`).join('') || `<tr><td colspan="7" class="muted">Nenhuma parcela encontrada.</td></tr>`;
      return `<div class="grid kpi"><div class="card kpiCard"><div class="kpiLabel">Recebido</div><div class="kpiVal">${fmtMoney(received)}</div><div class="kpiHint">Baixa confirmada</div></div><div class="card kpiCard"><div class="kpiLabel">A receber</div><div class="kpiVal">${fmtMoney(due)}</div><div class="kpiHint">Carteira futura</div></div><div class="card kpiCard"><div class="kpiLabel">Vencido</div><div class="kpiVal">${fmtMoney(overdue)}</div><div class="kpiHint">Inadimplência operacional</div></div><div class="card kpiCard"><div class="kpiLabel">Parcelas</div><div class="kpiVal">${pays.length}</div><div class="kpiHint">Plano financeiro gerado</div></div></div><div class="card" style="margin-top:16px"><div class="lotToolbar"><select onchange="setFilter('financeStatus',this.value)"><option value="all">Todos</option><option value="recebido" ${filters.financeStatus==='recebido'?'selected':''}>Recebidos</option><option value="a-vencer" ${filters.financeStatus==='a-vencer'?'selected':''}>A vencer</option><option value="vencido" ${filters.financeStatus==='vencido'?'selected':''}>Vencidos</option></select><span class="pill mint">Régua de cobrança por WhatsApp/e-mail prevista para integração</span></div><div class="tableWrap"><table><thead><tr><th>Cliente/Lote</th><th>Parcela</th><th>Vencimento</th><th>Valor</th><th>Status</th><th>Pago em</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;

    function assistantInsight(){

6. Garantir que o SDR pergunte sobre envio de materiais e que o corretor conclua a qualificação cadastral antes do contrato.`;

    function advanceLead(id){

    function askAssistant(){ const q=v('assistantQuestion').toLowerCase(); let ans=''; const a=analytics(); if(q.includes('abrir')||q.includes('demanda')){ const target=Math.round((currentProject().goalLots||a.lots.length)*(currentProject().goalSalePct||90)/100); ans = a.prioridades>=target ? `Sim. Há ${a.prioridades} leads em prioridade ou além para meta de ${target}. Eu ainda validaria reservas vencidas e contratos pendentes antes de abrir.` : `Ainda não. Há ${a.prioridades} leads em prioridade ou além para meta de ${target}. Recomendo aumentar clientes A e B antes da janela.`; } else if(q.includes('trav')){ const stuck=a.leads.filter(l=>new Date(l.nextDue||daysFromNow(9))<new Date()); ans=`Identifiquei ${stuck.length} lead(s) com próxima ação vencida. Priorize os de score acima de 60 e os vinculados a lotes.`; } else if(q.includes('inad')||q.includes('boleto')){ ans=`A carteira tem ${fmtMoney(a.vencidos)} vencidos e ${fmtMoney(a.aReceber)} a receber. A régua ideal é D-7, D-3, D-1, vencimento, D+1, D+5 e D+10.`; } else { ans='Minha leitura: foque em clientes A fora da prioridade, propostas em aprovação e bloqueios de lote com prazo vencido. Essa é a rota mais direta para aumentar velocidade sem desorganizar estoque.'; } const el=document.getElementById('assistantAnswer'); if(el) el.innerHTML=`<strong>Resposta</strong><p>${escapeHTML(ans)}</p>`; }

    function sidebarLogoSrc(){ return 'assets/logo_evora_sidebar_white.png'; }
    function lotGalleryUrls(lot){
      if(lot.gallery && lot.gallery.length) return lot.gallery;
      const title = `${lot.quadra}-${lot.numero}`;
      const theme = currentProject().name;
      const labels = [`Vista principal · ${title}`,`Acesso e entorno · ${lot.sector}`,`Implantação conceitual · ${lot.area} m²`,`Vocação · ${lot.vocacao}`];
      const colors = [['#245E82','#84C225'],['#173C52','#3D8B5C'],['#456B87','#9DD85B'],['#234A64','#84C225']];
      lot.gallery = labels.map((label,idx)=>{
        const [c1,c2] = colors[idx % colors.length];
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs><rect width="800" height="500" fill="url(#g)"/><rect x="28" y="28" width="744" height="444" rx="26" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.35)"/><path d="M40 360 C140 280, 240 300, 330 350 S520 420, 760 260 L760 470 L40 470 Z" fill="rgba(255,255,255,.14)"/><path d="M40 410 C150 350, 250 365, 360 405 S560 448, 760 332 L760 470 L40 470 Z" fill="rgba(255,255,255,.22)"/><text x="48" y="78" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">${escapeHTML(theme)}</text><text x="48" y="118" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800">${escapeHTML(label)}</text><text x="48" y="158" fill="#E7F7EE" font-family="Arial, Helvetica, sans-serif" font-size="24">${escapeHTML(lot.tipo)} · ${escapeHTML(lot.face)} · ${escapeHTML(lot.topografia)}</text><text x="48" y="445" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="22">${escapeHTML(lot.quadra)}-${escapeHTML(lot.numero)} · ${lot.area} m² · ${escapeHTML(lot.sector)}</text></svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      });
      return lot.gallery;
    }

    function renderTopbar(){ const titles = { dashboard:['Painel de comando','Termômetro de abertura, qualidade do funil, estoque, carteira e alertas executivos.'], sdr:['Painel SDR','Fila operacional de pré-atendimento, checklist por etapa, oferta de materiais e próximos passos por SDR.'], corretor:['Painel Corretor','Carteira consultiva do corretor com checklist por etapa, simulação, proposta, prioridade, reserva e fechamento.'], leads:['Leads e trilha de compra','Cadastro estruturado com classificação guiada, campanha, finalidade, perfil do comprador e roteiro de ação operacional.'], funil:['Funil Kanban','Esteira de compra com passagem de responsabilidade e orientação operacional por etapa.'], mapa:['Mapa de lotes','Mesa de estoque com detalhamento físico, financeiro, botão de detalhes e galeria demonstrativa do lote.'], simulador:['Simulador de condições','Simule condições de pagamento a partir do lote, do lead e da política comercial antes de gerar a proposta.'], propostas:['Propostas comerciais','Geração, simulação, envio, aprovação por alçada, aceite e conversão em contrato.'], aprovacoes:['Aprovações comerciais','Esteira de aprovação por alçada: corretor, gestor comercial, diretor comercial e diretoria.'], checklists:['Checklists jurídico-financeiros','Checklist de prontidão para proposta, contrato, entrada, boletos e abertura de carteira.'], contratos:['Contratos','Geração por modelo contratual somente após cadastro completo do comprador e eventual cônjuge.'], clientes:['Clientes e pós-venda','Clientes oriundos de contratos assinados, com ações de boas-vindas, materiais informativos e diário de obras.'], relatorios:['Relatórios','Indicadores por origem, campanha, corretor, estoque, alertas, carteira e inadimplência.'], financeiro:['Financeiro e carteira','Valores recebidos, a receber, vencidos e régua operacional de cobrança.'], equipe:['Equipe e permissões','Cadastro de Diretor Comercial, Gestor, SDRs, corretores e áreas de apoio por empreendimento.'], materiais:['Biblioteca comercial','Materiais publicitários, roteiros, mapas, books e arquivos para envio por etapa e persona.'], cadastros:['Cadastros mestres','Empreendimentos, campanhas, origens, finalidades, perfis de comprador, cidades por Estado, templates, identidade visual e parâmetros.'], integracoes:['Integrações','Preparação para Instagram, WhatsApp, e-mail, boletos, assinatura digital e API da OpenAI.'], assistente:['Assistente comercial virtual','Gestor comercial em modo local, pronto para futura conexão com API do ChatGPT.'], versoes:['Versões e controle','Changelog, exportação de dados e área técnica.'] }; const t = titles[view] || titles.dashboard; return `<div class="topbar"><div class="title"><h2>${t[0]}</h2><p>${t[1]}</p></div><div class="actions">${renderPrimaryActions()}</div></div>`; }
    function renderPrimaryActions(){ const map = { leads:`<button class="btn primary" onclick="openLeadForm()">+ Novo lead</button>`, mapa:`<button class="btn primary" onclick="setView('simulador')">Abrir simulador</button>`, simulador:`<button class="btn primary" onclick="openProposalFromSimulator()">Gerar proposta</button>`, propostas:`<button class="btn primary" onclick="openProposalForm()">+ Nova proposta</button>`, sdr:`<button class="btn primary" onclick="openLeadForm()">+ Lead</button>`, corretor:`<button class="btn primary" onclick="setView('simulador')">Simular condição</button><button class="btn" onclick="openProposalForm()">+ Proposta</button>`, aprovacoes:`<button class="btn" onclick="setView('propostas')">Ver propostas</button>`, checklists:`<button class="btn" onclick="setView('contratos')">Ver contratos</button>`, contratos:`<button class="btn" onclick="setView('clientes')">Ver clientes</button>`, clientes:`<button class="btn primary" onclick="openClient(projectClients()[0]?.lead.id || '')">Abrir cliente</button>`, equipe:`<button class="btn primary" onclick="openPersonForm()">+ Pessoa</button>`, materiais:`<button class="btn primary" onclick="openMaterialForm()">+ Material</button>`, cadastros:`<button class="btn primary" onclick="openProjectForm()">+ Empreendimento</button>`, versoes:`<button class="btn" onclick="exportJSON()">Exportar JSON</button>` }; return map[view] || `<button class="btn" onclick="setView('assistente')">Resumo IA</button><button class="btn primary" onclick="openLeadForm()">+ Lead</button>`; }
    function renderView(){ const views = {dashboard:renderDashboard, sdr:renderSdrPanel, corretor:renderCorretorPanel, leads:renderLeads, funil:renderFunil, mapa:renderMapa, simulador:renderSimulador, propostas:renderPropostas, aprovacoes:renderAprovacoes, checklists:renderChecklists, contratos:renderContratos, clientes:renderClientes, financeiro:renderFinanceiro, equipe:renderEquipe, materiais:renderMateriais, cadastros:renderCadastros, integracoes:renderIntegracoes, assistente:renderAssistente, versoes:renderVersoes}; return (views[view] || renderDashboard)(); }

    function renderMapa(){ const list = projectLots().filter(l=>(filters.lotStatus==='all'||l.status===filters.lotStatus) && (filters.lotQuadra==='all'||l.quadra===filters.lotQuadra)); const quadras = [...new Set(projectLots().map(l=>l.quadra))].sort(); return `<div class="card"><div class="lotToolbar"><select onchange="setFilter('lotStatus',this.value)"><option value="all">Todos os status</option>${LOT_STATUS.map(s=>`<option value="${s}" ${filters.lotStatus===s?'selected':''}>${lotStatusLabel(s)}</option>`).join('')}</select><select onchange="setFilter('lotQuadra',this.value)"><option value="all">Todas as quadras</option>${quadras.map(q=>`<option value="${q}" ${filters.lotQuadra===q?'selected':''}>${q}</option>`).join('')}</select><span class="pill mint">${list.length} lotes listados</span><button class="btn" onclick="setView('simulador')">Simular condição</button></div><div class="grid three" style="margin-top:14px">${list.map(l=>`<div class="lotCard"><div class="lotHead"><div><h3>${escapeHTML(l.quadra)}-${escapeHTML(l.numero)}</h3><div class="tiny">${escapeHTML(l.tipo)} · ${escapeHTML(l.sector)}</div></div><span class="pill ${statusPill(l.status)}">${lotStatusLabel(l.status)}</span></div><div class="lotMeta"><b>${l.area} m²</b> · ${fmtMoney(l.precoBase)}<br>Preço/m²: ${fmtMoney(l.precoM2)}<br>${l.leadId?`Vinculado a ${escapeHTML(leadName(l.leadId))}`:'Sem vínculo comercial'}</div><div class="actions"><button class="btn small" onclick="openLot('${l.id}')">Detalhes</button><button class="btn small" onclick="openSimulator('${l.id}')">Simular</button>${l.leadId?`<button class="btn small" onclick="openLead('${l.leadId}')">Lead</button>`:''}</div></div>`).join('') || '<div class="empty">Nenhum lote encontrado.</div>'}</div></div>`; }
    function openLot(id){ const l=lotById(id); if(!l) return; const lead=l.leadId?leadById(l.leadId):null; const body = `<div class="grid four"><div class="miniStat"><span>Status</span><b>${lotStatusLabel(l.status)}</b></div><div class="miniStat"><span>Preço</span><b>${fmtMoney(l.precoBase)}</b></div><div class="miniStat"><span>Área</span><b>${l.area} m²</b></div><div class="miniStat"><span>Preço/m²</span><b>${fmtMoney(l.precoM2)}</b></div></div><div class="card" style="box-shadow:none;margin-top:14px"><h3>Galeria do lote</h3><p class="tiny">Galeria horizontal demonstrativa para apoiar atendimento, escolha e proposta do lote.</p>${renderGalleryStrip(l)}</div><div class="split" style="margin-top:14px"><div class="card" style="box-shadow:none"><h3>Detalhamento do lote</h3><p><b>Quadra/Lote:</b> ${escapeHTML(l.quadra)}-${escapeHTML(l.numero)}<br><b>Setor:</b> ${escapeHTML(l.sector)}<br><b>Vocação:</b> ${escapeHTML(l.vocacao)}<br><b>Tipo:</b> ${escapeHTML(l.tipo)}<br><b>Frente/Fundo:</b> ${l.frente} m / ${l.fundo} m<br><b>Laterais:</b> ${l.lateralDir} m / ${l.lateralEsq} m<br><b>Topografia:</b> ${escapeHTML(l.topografia)}<br><b>Face:</b> ${escapeHTML(l.face)}<br><b>Tabela:</b> ${escapeHTML(l.tabela)}<br><b>Fator premium:</b> ${l.premiumFactor}x</p><div class="actions" style="justify-content:flex-start;margin-top:12px"><button class="btn primary" onclick="openSimulator('${l.id}')">Simular condição</button></div></div><div class="card" style="box-shadow:none"><h3>Vínculos comerciais</h3><p><b>Lead:</b> ${lead?escapeHTML(lead.name):'—'}<br><b>SDR:</b> ${escapeHTML(teamName(l.sdrId))}<br><b>Corretor:</b> ${escapeHTML(teamName(l.corretorId))}<br><b>Expiração:</b> ${fmtDateTime(l.blockedUntil)}<br><b>Motivo:</b> ${escapeHTML(l.blockReason||'—')}</p><div class="callout" style="margin-top:10px"><strong>Regra de bloqueio</strong><p>Bloqueios de prioridade e pré-reserva devem ter lead, SDR, corretor e prazo de expiração.</p></div></div></div><div class="card" style="box-shadow:none;margin-top:14px"><h3>Atualizar status / vínculo</h3><div class="formGrid"><div class="field"><label>Status</label><select id="lotStatus">${LOT_STATUS.map(s=>`<option value="${s}" ${l.status===s?'selected':''}>${lotStatusLabel(s)}</option>`).join('')}</select></div><div class="field"><label>Lead vinculado</label><select id="lotLead"><option value="">Sem lead</option>${projectLeads().map(ld=>`<option value="${ld.id}" ${l.leadId===ld.id?'selected':''}>${escapeHTML(ld.name)} · ${escapeHTML(ld.city)}</option>`).join('')}</select></div><div class="field"><label>Expira em dias</label><input id="lotDays" type="number" value="2"></div><div class="field span3"><label>Motivo/observação</label><textarea id="lotReason">${escapeHTML(l.blockReason||'')}</textarea></div><div class="field span3"><button class="btn primary" onclick="saveLot('${l.id}')">Salvar lote</button></div></div></div>`; openModal(`${l.quadra}-${l.numero}`, `${l.tipo} · ${l.sector} · ${fmtMoney(l.precoBase)}`, body, 'wide'); }
    function openSimulator(lotId='', leadId=''){ const preset = simulatorPreset(lotId); const body = `<div class="formGrid"><div class="field"><label>Lead</label><select id="simLead"><option value="">Sem lead específico</option>${projectLeads().map(l=>`<option value="${l.id}" ${l.id===leadId?'selected':''}>${escapeHTML(l.name)} · ${escapeHTML(l.city)} · ${l.score}</option>`).join('')}</select></div><div class="field"><label>Lote</label><select id="simLot" onchange="updateSimulatorPreview()">${projectLots().map(l=>`<option value="${l.id}" ${preset.lot && l.id===preset.lot.id?'selected':''}>${escapeHTML(l.quadra)}-${escapeHTML(l.numero)} · ${l.area} m² · ${fmtMoney(l.precoBase)}</option>`).join('')}</select></div><div class="field"><label>Entrada %</label><input id="simEntry" type="number" value="${preset.entryPct}" oninput="updateSimulatorPreview()"></div><div class="field"><label>Mensais</label><input id="simMonths" type="number" value="${preset.months}" oninput="updateSimulatorPreview()"></div><div class="field"><label>Anuais</label><input id="simAnnuals" type="number" value="${preset.annuals}" oninput="updateSimulatorPreview()"></div><div class="field"><label>Juros a.m.</label><input id="simInterest" type="number" step="0.01" value="${preset.interest}" oninput="updateSimulatorPreview()"></div><div class="field"><label>Fator anual</label><input id="simRatio" type="number" step="0.01" value="${preset.annualRatio}" oninput="updateSimulatorPreview()"></div><div class="field"><label>Índice</label><select id="simIndex" onchange="updateSimulatorPreview()"><option ${preset.index==='IPCA'?'selected':''}>IPCA</option><option>IGP-M</option><option>INCC</option><option>Sem correção</option></select></div><div class="field span3" id="simResults">${simulatorSummaryHTML({leadId, lotId:preset.lot?preset.lot.id:'', entryPct:preset.entryPct, months:preset.months, annuals:preset.annuals, interest:preset.interest, annualRatio:preset.annualRatio, index:preset.index})}</div><div class="field span3"><button class="btn primary" onclick="openProposalFromSimulator()">Gerar proposta a partir desta condição</button></div></div>`; openModal('Simulador de condições','Ferramenta de apoio para atendimento, lote e proposta.', body, 'wide'); }
    function renderSimulador(){ const preset = simulatorPreset(); return `<div class="card"><div class="callout"><strong>Uso recomendado</strong><p>O simulador deve ser usado tanto no menu principal quanto a partir do lote ou da proposta, servindo como etapa intermediária de convencimento e alinhamento comercial.</p></div><div class="formGrid" style="margin-top:14px"><div class="field"><label>Lead</label><select id="simLead"><option value="">Sem lead específico</option>${projectLeads().map(l=>`<option value="${l.id}">${escapeHTML(l.name)} · ${escapeHTML(l.city)} · ${l.score}</option>`).join('')}</select></div><div class="field"><label>Lote</label><select id="simLot" onchange="updateSimulatorPreview()">${projectLots().map(l=>`<option value="${l.id}" ${preset.lot&&l.id===preset.lot.id?'selected':''}>${escapeHTML(l.quadra)}-${escapeHTML(l.numero)} · ${l.area} m² · ${fmtMoney(l.precoBase)}</option>`).join('')}</select></div><div class="field"><label>Entrada %</label><input id="simEntry" type="number" value="10" oninput="updateSimulatorPreview()"></div><div class="field"><label>Mensais</label><input id="simMonths" type="number" value="180" oninput="updateSimulatorPreview()"></div><div class="field"><label>Anuais</label><input id="simAnnuals" type="number" value="15" oninput="updateSimulatorPreview()"></div><div class="field"><label>Juros a.m.</label><input id="simInterest" type="number" step="0.01" value="0.7" oninput="updateSimulatorPreview()"></div><div class="field"><label>Fator anual</label><input id="simRatio" type="number" step="0.01" value="28.35" oninput="updateSimulatorPreview()"></div><div class="field"><label>Índice</label><select id="simIndex" onchange="updateSimulatorPreview()"><option>IPCA</option><option>IGP-M</option><option>INCC</option><option>Sem correção</option></select></div><div class="field span3" id="simResults">${simulatorSummaryHTML({leadId:'', lotId:preset.lot?preset.lot.id:'', entryPct:10, months:180, annuals:15, interest:0.7, annualRatio:28.35, index:'IPCA'})}</div><div class="field span3"><button class="btn primary" onclick="openProposalFromSimulator()">Gerar proposta</button></div></div></div>`; }
    function openProposalForm(preLeadId='', preLotId='', defaults={}){ const lotDefault = preLotId || ((leadById(preLeadId)||{}).linkedLotId) || ((projectLots().find(l=>['livre','prioridade'].includes(l.status))||{}).id) || ''; const body = `<div class="formGrid"><div class="field"><label>Lead</label><select id="propLead" onchange="proposalLeadChanged()">${proposalLeadOptions(preLeadId)}</select></div><div class="field"><label>Lote</label><select id="propLot" onchange="previewProposal()">${proposalLotOptions(lotDefault)}</select></div><div class="field"><label>Entrada %</label><input id="propEntry" type="number" value="${defaults.entryPct ?? 10}" oninput="previewProposal()"></div><div class="field"><label>Mensais</label><input id="propMonths" type="number" value="${defaults.months ?? 180}" oninput="previewProposal()"></div><div class="field"><label>Anuais</label><input id="propAnnuals" type="number" value="${defaults.annuals ?? 15}" oninput="previewProposal()"></div><div class="field"><label>Juros a.m.</label><input id="propInterest" type="number" step="0.01" value="${defaults.interest ?? 0.7}" oninput="previewProposal()"></div><div class="field"><label>Fator anual</label><input id="propRatio" type="number" step="0.01" value="${defaults.annualRatio ?? 28.35}" oninput="previewProposal()"></div><div class="field"><label>Índice</label><select id="propIndex" onchange="previewProposal()"><option ${((defaults.index||'IPCA')==='IPCA')?'selected':''}>IPCA</option><option ${defaults.index==='IGP-M'?'selected':''}>IGP-M</option><option ${defaults.index==='INCC'?'selected':''}>INCC</option><option ${defaults.index==='Sem correção'?'selected':''}>Sem correção</option></select></div><div class="field"><label>Status inicial</label><select id="propStatus"><option value="rascunho">Rascunho</option><option value="enviada">Enviada</option><option value="em-aprovacao">Em aprovação</option><option value="aprovada">Aprovada</option></select></div><div class="field"><label>Validade</label><input id="propExpires" type="date" value="${daysFromNow(5).slice(0,10)}"></div><div class="field span3"><div id="proposalPreview" class="callout"><strong>Prévia</strong><p>Escolha lead e lote para calcular.</p></div></div><div class="field span3"><button class="btn" onclick="openSimulator(v('propLot'), v('propLead'))">Abrir simulador</button> <button class="btn primary" onclick="createProposal()">Criar proposta</button></div></div>`; openModal('Nova proposta','Proposta com simulador embutido, status e alçada de aprovação.',body,'wide'); setTimeout(previewProposal,50); }
    function previewProposal(){ const lot=lotById(v('propLot')); if(!lot) return; const sim=simulatePlan(lot.precoBase,+v('propEntry')||10,+v('propMonths')||180,+v('propAnnuals')||15,+v('propInterest')||0.7,+v('propRatio')||28.35); const el=document.getElementById('proposalPreview'); if(el) el.innerHTML=`<strong>Prévia financeira</strong><p>Preço: ${fmtMoney(lot.precoBase)} · Entrada: ${fmtMoney(sim.entry)} · Mensais: ${v('propMonths')}x ${fmtMoney(sim.monthly)} · Anuais: ${v('propAnnuals')}x ${fmtMoney(sim.annual)} · Total nominal: ${fmtMoney(sim.totalNominal)} · Ganho financeiro real estimado: ${fmtMoney(sim.realGain)}.</p>`; }
    function proposalLeadChanged(){ previewProposal(); }
    function createProposal(){ const lead=leadById(v('propLead')), lot=lotById(v('propLot')); if(!lead||!lot){ showToast('Selecione lead e lote.'); return; } const sim=simulatePlan(lot.precoBase,+v('propEntry')||10,+v('propMonths')||180,+v('propAnnuals')||15,+v('propInterest')||0.7,+v('propRatio')||28.35); const prop={id:uid('prop'), projectId:projectId(), leadId:lead.id, lotId:lot.id, createdBy:lead.corretorId||autoAssign('Corretor'), status:v('propStatus'), price:lot.precoBase, discountPct:0, entryPct:+v('propEntry')||10, monthlyCount:+v('propMonths')||180, annualCount:+v('propAnnuals')||15, interestMonthly:+v('propInterest')||0.7, annualRatio:+v('propRatio')||28.35, indexLabel:v('propIndex'), entryValue:sim.entry, monthlyValue:sim.monthly, annualValue:sim.annual, totalNominal:sim.totalNominal, realGain:sim.realGain, expiresAt:v('propExpires')?new Date(v('propExpires')).toISOString():daysFromNow(5), approvals:v('propStatus')==='em-aprovacao'?[{ts:nowISO(), by:currentProject().managerId, status:'pendente', note:'Aguardando aprovação do gestor comercial.'}]:[], createdAt:nowISO(), updatedAt:nowISO()}; state.proposals.push(prop); if(stageIndex(lead.stage)<stageIndex('proposta')) lead.stage='proposta'; lead.history.push({ts:nowISO(), text:`Proposta ${prop.id} criada com status ${proposalStatusLabel(prop.status)}.`}); save(); closeModal(); render(); showToast('Proposta criada.'); }

    function stageChecklistForLead(lead){ const s = lead.stage; const map = { 'lead':[{id:'lead-origem',label:'Validar origem, campanha, finalidade e perfil do comprador',owner:'SDR'},{id:'lead-contato',label:'Realizar primeiro contato e confirmar dados básicos',owner:'SDR'},{id:'lead-material',label:'Perguntar se deseja receber materiais de marketing',owner:'SDR'}], 'pre-atendimento':[{id:'pre-dados',label:'Confirmar WhatsApp, cidade, decisor e interesse inicial',owner:'SDR'},{id:'pre-entrada',label:'Sondar capacidade de entrada e timing de compra',owner:'SDR'},{id:'pre-material',label:'Registrar interesse em book, mapa, tabela ou vídeo',owner:'SDR'}], 'qualificacao':[{id:'qual-score',label:'Classificar lead em A/B/C/D',owner:'SDR'},{id:'qual-index',label:'Explicar IPCA + juros remuneratórios',owner:'SDR'},{id:'qual-corretor',label:'Preparar passagem ao corretor quando qualificado',owner:'SDR'}], 'aquecimento':[{id:'aq-envio',label:'Enviar material aderente ao perfil do lead',owner:'SDR'},{id:'aq-follow',label:'Executar follow-up ativo de retomada',owner:'SDR'},{id:'aq-agenda',label:'Preparar atendimento consultivo com o corretor',owner:'SDR'}], 'atendimento':[{id:'atend-diagnostico',label:'Conduzir atendimento consultivo e mapear preferências',owner:'Corretor'},{id:'atend-lotes',label:'Apresentar lotes compatíveis',owner:'Corretor'},{id:'atend-obje',label:'Registrar objeções e argumentos de valor',owner:'Corretor'}], 'simulacao':[{id:'sim-exec',label:'Executar simulação de condição',owner:'Corretor'},{id:'sim-ajuste',label:'Ajustar entrada, prazo e anuais conforme cenário',owner:'Corretor'},{id:'sim-valid',label:'Validar aceitação comercial da condição',owner:'Corretor'}], 'proposta':[{id:'prop-envio',label:'Emitir e apresentar proposta formal',owner:'Corretor'},{id:'prop-validade',label:'Explicar validade e regra comercial da proposta',owner:'Corretor'},{id:'prop-alcada',label:'Conferir necessidade de alçada/aprovação',owner:'Corretor'}], 'prioridade':[{id:'prio-lote',label:'Vincular lote de interesse',owner:'Corretor'},{id:'prio-prazo',label:'Definir prazo de bloqueio e informar ao cliente',owner:'Corretor'},{id:'prio-doc',label:'Solicitar documentação para reserva/contrato',owner:'Corretor'}], 'pre-reserva':[{id:'reserva-lote',label:'Confirmar lote e status de pré-reserva',owner:'Corretor'},{id:'reserva-cadastro',label:'Conferir documentação do comprador e cônjuge',owner:'Corretor'},{id:'reserva-fech',label:'Alinhar encaminhamento do contrato',owner:'Corretor'}], 'contrato':[{id:'contrato-cadastro',label:'Completar cadastro do comprador',owner:'Corretor'},{id:'contrato-conjuge',label:'Completar cadastro do eventual cônjuge',owner:'Corretor'},{id:'contrato-envio',label:'Encaminhar contrato para assinatura',owner:'Jurídico/Comercial'}], 'entrada-paga':[{id:'entrada-baixa',label:'Confirmar assinatura e evolução financeira inicial',owner:'Financeiro'},{id:'entrada-boasvindas',label:'Enviar boas-vindas e próximo passo do pós-venda',owner:'Pós-venda'},{id:'entrada-materiais',label:'Disponibilizar materiais informativos iniciais',owner:'Pós-venda'}], 'carteira':[{id:'cart-monitor',label:'Monitorar carteira e comunicação contínua',owner:'Pós-venda'},{id:'cart-obra',label:'Enviar diário de obra/informativos quando aplicável',owner:'Pós-venda'},{id:'cart-checkin',label:'Realizar check-in periódico com o cliente',owner:'Pós-venda'}] }; return map[s] || map['lead']; }
    function stageTaskDone(lead, stageId, taskId){ return !!(((lead.stageTasks||{})[stageId]||{})[taskId]); }
    function renderLeadChecklist(lead){ const tasks = stageChecklistForLead(lead); return `<div class="checklistGrid">${tasks.map(task=>{ const done = stageTaskDone(lead, lead.stage, task.id); return `<div class="checklistCard ${done?'done':''}"><div class="roleHeader" style="margin-bottom:0"><div><b>${escapeHTML(task.label)}</b><div class="tiny">Responsável: ${escapeHTML(task.owner)}</div></div><span class="pill ${done?'green':'gray'}">${done?'feito':'pendente'}</span></div><div class="tiny">${done?`Registrado em ${fmtDateTime(lead.stageTasks[lead.stage][task.id])}`:'A ação ainda não foi registrada nesta etapa.'}</div><div class="actions" style="justify-content:flex-start"><button class="btn small ${done?'':'primary'}" onclick="registerLeadChecklistAction('${lead.id}','${task.id}')">${done?'Registrar novamente':'Registrar ação'}</button></div></div>`; }).join('')}</div>`; }
    function registerLeadChecklistAction(id, taskId){ const l = leadById(id); if(!l) return; const task = stageChecklistForLead(l).find(t=>t.id===taskId); if(!task) return; l.stageTasks = l.stageTasks || {}; l.stageTasks[l.stage] = l.stageTasks[l.stage] || {}; l.stageTasks[l.stage][taskId] = nowISO(); if(taskId.includes('material')) l.materialOfferAsked = true; l.history.push({ts:nowISO(), text:`Checklist da etapa registrado: ${task.label}.`}); save(); render(); openLead(id); showToast('Ação registrada na etapa.'); }
    function addLeadQuickNote(id){ const l=leadById(id); if(!l) return; const note=v('leadQuickNote'); if(!note) return showToast('Digite uma observação rápida.'); l.history.push({ts:nowISO(), text:`Registro rápido: ${note}`}); l.nextAction = note; save(); render(); openLead(id); showToast('Observação registrada.'); }
    function openLead(id){ const l = leadById(id); if(!l) return; ensureLeadDefaults(l); const t=temp(l.score); const idx=stageIndex(l.stage); const guide=playbookForLead(l); const pend=contractPendencies(l); const body = `<div class="grid three"><div class="miniStat"><span>Temperatura</span><b>Cliente ${t.label} · ${l.score}</b></div><div class="miniStat"><span>Etapa</span><b>${escapeHTML(getStage(l.stage).short)}</b></div><div class="miniStat"><span>Dono atual</span><b>${escapeHTML(ownerName(l))}</b></div></div><div class="card" style="box-shadow:none;margin:14px 0"><h3>Trilha de compra</h3><div class="trail" style="gap:6px">${STAGES.map((s,i)=>`<div class="trailDot ${i<=idx?'done':''} ${i===idx?'current':''}" title="${escapeHTML(s.label)}" style="height:12px"></div>`).join('')}</div><div class="progressLabel">${progressOf(l.stage)}% concluído · ${escapeHTML(getStage(l.stage).label)} · responsável: ${escapeHTML(getStage(l.stage).owner)}</div></div><div class="split"><div class="card" style="box-shadow:none"><h3>Guia operacional da etapa</h3><div class="callout"><strong>Orientação para ${escapeHTML(ownerName(l))}</strong><p>Use esta ficha como roteiro obrigatório de condução comercial. O sistema deve conduzir o SDR e o corretor até o contrato, a assinatura e o pós-venda.</p></div><ul class="guideList">${guide.actions.map(item=>`<li>${escapeHTML(item)}</li>`).join('') || '<li>Sem ações sugeridas.</li>'}</ul>${guide.missing.length?`<div class="sectionTitle">Pontos ainda não validados</div><ul class="dangerList">${guide.missing.map(item=>`<li class="statusWarn">${escapeHTML(item)}</li>`).join('')}</ul>`:''}<div class="sectionTitle">Checklist operacional da etapa</div>${renderLeadChecklist(l)}<div class="quickNote" style="margin-top:12px"><input id="leadQuickNote" placeholder="Registrar observação rápida / próxima ação"><button class="btn small" onclick="addLeadQuickNote('${l.id}')">Registrar nota</button><button class="btn small" onclick="registerMaterialOffer('${l.id}')">Pergunta sobre materiais</button><button class="btn small" onclick="registerMaterialSent('${l.id}')">Material enviado</button><button class="btn small success" onclick="advanceLead('${l.id}')">Avançar etapa</button></div></div><div class="card" style="box-shadow:none"><h3>Prontidão contratual</h3><p><b>Status:</b> ${pend.length?'<span class="statusWarn">cadastro incompleto</span>':'<span class="statusOk">pronto para contrato</span>'}<br><b>Materiais:</b> ${l.materialOfferAsked?'ofertados':'não ofertados'} · ${l.materialsSent?'enviados':'não enviados'}<br><b>Origem/Campanha:</b> ${escapeHTML(originName(l.originId))} / ${escapeHTML(campaignName(l.campaignId)||l.campaign||'—')}</p>${pend.length?`<ul class="dangerList">${pend.map(item=>`<li>${escapeHTML(item)}</li>`).join('')}</ul>`:'<div class="callout"><strong>Checklist contratual completo</strong><p>Comprador apto para geração de contrato, sujeito apenas à aprovação da proposta e revisão jurídica.</p></div>'}<div class="actions" style="justify-content:flex-start;margin-top:14px"><button class="btn small" onclick="openProposalForm('${l.id}','${l.linkedLotId||''}')">Criar proposta</button><button class="btn small" onclick="openSimulator('${l.linkedLotId||''}','${l.id}')">Simular</button>${l.linkedLotId?`<button class="btn small" onclick="openLot('${l.linkedLotId}')">Abrir lote</button>`:''}</div></div></div><div class="card" style="box-shadow:none;margin-top:14px"><h3>Ficha comercial e cadastro complementar</h3><div class="formGrid">${inputEdit('Nome do interessado','editName',l.name)}${inputEdit('WhatsApp','editPhone',l.phone||'')}${inputEdit('E-mail','editEmail',l.email||'')}<div class="field"><label>Campanha</label><select id="editCampaign">${state.campaigns.map(o=>`<option value="${o.id}" ${o.id===l.campaignId?'selected':''}>${escapeHTML(o.name)}</option>`).join('')}</select></div><div class="field"><label>Finalidade</label><select id="editPurpose">${state.purposes.map(o=>`<option value="${o.id}" ${o.id===l.purposeId?'selected':''}>${escapeHTML(o.name)}</option>`).join('')}</select></div><div class="field"><label>Perfil do comprador</label><select id="editBuyerProfile">${state.buyerProfiles.map(o=>`<option value="${o.id}" ${o.id===l.buyerProfileId?'selected':''}>${escapeHTML(o.name)}</option>`).join('')}</select></div>${inputEdit('CPF/CNPJ','editDocument',l.document||'')}${inputEdit('Profissão','editProfession',l.profession||'')}${inputEdit('Nascimento','editBirthDate',l.birthDate||'','date')}${selectEdit('Estado civil','editMarital',[['Solteiro(a)','Solteiro(a)'],['Casado(a)','Casado(a)'],['União estável','União estável'],['Divorciado(a)','Divorciado(a)'],['Viúvo(a)','Viúvo(a)']],l.maritalStatus||'Solteiro(a)')}${inputEdit('Decisor principal','editDecision',l.decisionMaker||'')}${inputEdit('Perfil de lote','editDesired',l.desiredLotProfile||'')}${selectEdit('Etapa','editStage',STAGES.map(s=>[s.id,s.label]),l.stage)}${selectEdit('SDR','editSdr',projectTeam('SDR').map(t=>[t.id,t.name]),l.sdrId)}${selectEdit('Corretor','editCor',projectTeam('Corretor').map(t=>[t.id,t.name]),l.corretorId,true)}${inputEdit('Score','editScore',l.score,'number')}${inputEdit('Próxima ação','editNext',l.nextAction||'')}${inputEdit('Prazo','editDue',(l.nextDue||'').slice(0,16),'datetime-local')}<div class="field"><label><input type="checkbox" id="editEntry" ${l.entryReady?'checked':''}> Entrada viável</label></div><div class="field"><label><input type="checkbox" id="editAnnuals" ${l.acceptsAnnuals?'checked':''}> Aceita anuais</label></div><div class="field"><label><input type="checkbox" id="editIndex" ${l.understandsIndex?'checked':''}> Entendeu IPCA + juros</label></div><div class="field"><label><input type="checkbox" id="editMatOffer" ${l.materialOfferAsked?'checked':''}> Perguntou sobre materiais</label></div><div class="field"><label><input type="checkbox" id="editMatSent" ${l.materialsSent?'checked':''}> Material enviado</label></div><div class="field"><label>Materiais enviados</label><input id="editMatNames" value="${escapeHTML((l.materialsSentNames||[]).join(', '))}" placeholder="Ex.: book, mapa, tabela"></div><div class="field span3"><label>Endereço</label><input id="editAddress" value="${escapeHTML(l.address||'')}" placeholder="Rua / avenida"></div>${inputEdit('Número','editNumber',l.number||'')}${inputEdit('Complemento','editComplement',l.complement||'')}${inputEdit('Bairro','editDistrict',l.district||'')}${inputEdit('CEP','editCep',l.cep||'')}${selectEdit('UF','editUF',UF_LIST.map(u=>[u,u]),l.uf||currentProject().uf)}${selectEdit('Cidade','editCity',citiesForUF(l.uf||currentProject().uf).map(c=>[c,c]),l.city||currentProject().city)}<div class="field span3 sectionTitle">Dados do eventual cônjuge</div>${inputEdit('Nome do cônjuge','editSpouseName',l.spouseName||'')}${inputEdit('CPF do cônjuge','editSpouseDoc',l.spouseDocument||'')}${inputEdit('WhatsApp do cônjuge','editSpousePhone',l.spousePhone||'')}<div class="field span2"><label>E-mail do cônjuge</label><input id="editSpouseEmail" value="${escapeHTML(l.spouseEmail||'')}"></div><div class="field"><label>&nbsp;</label><span class="tiny">Preencha quando aplicável para liberar o contrato.</span></div><div class="field span3"><label>Observações</label><textarea id="editNotes">${escapeHTML(l.notes||'')}</textarea></div><div class="field span3"><button class="btn primary" onclick="saveLeadEdit('${l.id}')">Salvar ficha</button> <button class="btn success" onclick="advanceLead('${l.id}')">Avançar etapa</button></div></div></div><div class="card" style="box-shadow:none;margin-top:14px"><h3>Histórico</h3><div class="timeline">${(l.history||[]).slice().reverse().map(e=>`<div class="event"><b>${fmtDateTime(e.ts)}</b><span>${escapeHTML(e.text)}</span></div>`).join('')}</div></div>`; openModal(l.name, `${l.phone} · ${l.city}/${l.uf} · ${originName(l.originId)}`, body, 'wide'); }
    function saveLeadEdit(id){ const l=leadById(id); if(!l) return; const old=l.stage; l.name=normalizeHumanName(v('editName')); l.phone=v('editPhone'); l.email=v('editEmail'); l.campaignId=v('editCampaign'); l.campaign=campaignName(l.campaignId); l.purposeId=v('editPurpose'); l.finalidade=purposeName(l.purposeId); l.buyerProfileId=v('editBuyerProfile'); l.buyerProfile=buyerProfileName(l.buyerProfileId); l.document=v('editDocument'); l.profession=v('editProfession'); l.birthDate=v('editBirthDate'); l.maritalStatus=v('editMarital'); l.decisionMaker=v('editDecision'); l.desiredLotProfile=v('editDesired'); l.stage=v('editStage'); l.sdrId=v('editSdr'); l.corretorId=v('editCor'); l.score=Math.max(0,Math.min(100,+v('editScore')||0)); l.nextAction=v('editNext'); l.nextDue=v('editDue')?new Date(v('editDue')).toISOString():null; l.entryReady=checked('editEntry'); l.acceptsAnnuals=checked('editAnnuals'); l.understandsIndex=checked('editIndex'); l.materialOfferAsked=checked('editMatOffer'); l.materialsSent=checked('editMatSent'); l.materialsSentNames=v('editMatNames').split(',').map(s=>s.trim()).filter(Boolean); l.address=v('editAddress'); l.number=v('editNumber'); l.complement=v('editComplement'); l.district=v('editDistrict'); l.cep=v('editCep'); l.uf=v('editUF'); l.city=v('editCity'); l.spouseName=normalizeHumanName(v('editSpouseName')); l.spouseDocument=v('editSpouseDoc'); l.spousePhone=v('editSpousePhone'); l.spouseEmail=v('editSpouseEmail'); l.notes=v('editNotes'); ensureAssignment(l); ensureLeadDefaults(l); if(old!==l.stage) l.history.push({ts:nowISO(), text:`Etapa alterada: ${getStage(old).label} → ${getStage(l.stage).label}.`}); l.history.push({ts:nowISO(), text:'Ficha do lead atualizada com dados comerciais/cadastrais.'}); save(); render(); openLead(id); showToast('Ficha atualizada.'); }
    function advanceLead(id){ const l=leadById(id); if(!l) return; const i=stageIndex(l.stage); if(i>=STAGES.length-1){ showToast('Lead já está no fim da trilha.'); return; } const next=STAGES[i+1]; if(l.score<next.minScore) showToast(`Atenção: score ${l.score}. A etapa recomenda mínimo ${next.minScore}.`); const old=l.stage; l.stage=next.id; ensureAssignment(l); if(next.id==='prioridade' && !l.linkedLotId) l.nextAction='Vincular lote compatível para prioridade'; if(next.id==='proposta') l.nextAction='Gerar ou enviar proposta comercial'; if(next.id==='contrato') l.nextAction='Conferir dados completos do comprador e cônjuge antes do envio'; if(next.id==='carteira') l.nextAction='Ativar pós-venda e monitoramento do cliente'; const guide=playbookForLead(l); l.history.push({ts:nowISO(), text:`Avanço: ${getStage(old).label} → ${next.label}. Dono: ${ownerName(l)}. Próxima orientação: ${guide.actions[0]||l.nextAction}.`}); save(); render(); openLead(id); showToast('Lead avançou na trilha.'); }
    function registerMaterialOffer(id){ const l=leadById(id); if(!l) return; l.materialOfferAsked=true; l.history.push({ts:nowISO(), text:'Equipe registrou que perguntou sobre envio de materiais de marketing.'}); save(); render(); openLead(id); showToast('Pergunta sobre materiais registrada.'); }
    function registerMaterialSent(id){ const l=leadById(id); if(!l) return; l.materialOfferAsked=true; l.materialsSent=true; if(!l.materialsSentNames.length){ l.materialsSentNames = projectMaterials().slice(0,2).map(m=>m.name); } l.history.push({ts:nowISO(), text:`Materiais enviados ao lead: ${(l.materialsSentNames||[]).join(', ') || 'material de apresentação'}.`}); save(); render(); openLead(id); showToast('Envio de materiais registrado.'); }

    function daysSince(iso){ if(!iso) return 9999; return Math.floor((new Date()-new Date(iso))/(1000*60*60*24)); }
    function lastLeadActivity(l){ const hist=(l.history||[]); const last=hist.length?hist[hist.length-1].ts:l.createdAt; return last || l.createdAt; }
    function lastClientCommunication(lead){
      const actions = lead.postSaleActions || [];
      if(actions.length) return actions[actions.length-1].ts;
      return lead.clientSince || lastLeadActivity(lead);
    }
    function isLeadStalled(l){
      if(['contrato','entrada-paga','carteira'].includes(l.stage)) return false;
      if(l.nextDue && new Date(l.nextDue) < new Date()) return true;
      return daysSince(lastLeadActivity(l)) >= 3;
    }
    function clientCommunicationOverdue(lead){ return daysSince(lastClientCommunication(lead)) > 30; }
    function requiredStageActionIds(lead){ return stageChecklistForLead(lead).map(t=>t.id); }
    function missingStageActions(lead){
      const done = (lead.stageTasks && lead.stageTasks[lead.stage]) || {};
      return stageChecklistForLead(lead).filter(t=>!done[t.id]).map(t=>t.label);
    }
    function stageHardPendencies(lead){
      const missing = [];
      missing.push(...missingStageActions(lead));
      if(['qualificacao','aquecimento','atendimento','simulacao','proposta','prioridade','pre-reserva','contrato'].includes(lead.stage)){
        if(!lead.entryReady) missing.push('Capacidade de entrada validada');
        if(!lead.understandsIndex) missing.push('IPCA + juros explicado e compreendido');
      }
      if(['prioridade','pre-reserva','contrato'].includes(lead.stage) && !lead.linkedLotId) missing.push('Lote vinculado ao lead');
      if(lead.stage==='contrato') missing.push(...contractPendencies(lead));
      return [...new Set(missing)];
    }

    function renderDashboard(){ const a=analytics(); const goal=currentProject().goalLots||a.lots.length; const target=Math.round(goal*(currentProject().goalSalePct||90)/100); const stalled=projectLeads().filter(isLeadStalled); const overdueClients=projectClients().filter(x=>clientCommunicationOverdue(x.lead)); const stageRows=STAGES.map(s=>{ const n=a.leads.filter(l=>l.stage===s.id).length; return `<div class="stageRow"><b>${escapeHTML(s.short)}</b><div class="barWrap"><div class="bar" style="width:${pct(n,Math.max(1,a.leads.length))}%"></div></div><span>${n}</span></div>`; }).join(''); return `<div class="grid kpi">${kpi('Leads cadastrados',a.leads.length,`${a.clientesA} clientes A`)}${kpi('Leads parados',stalled.length,'Ação vencida ou sem movimento')}${kpi('Clientes sem comunicação',overdueClients.length,'Mais de 30 dias')}${kpi('Carteira potencial',fmtMoney(a.carteira),`Recebido: ${fmtMoney(a.recebidos)}`)}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Trilha de compra</h3><div class="stageBars">${stageRows}</div></div><div class="card"><h3>Alertas críticos</h3>${dashboardAlerts()}</div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Leads parados</h3><div class="timeline">${stalled.map(l=>`<div class="event"><b>${escapeHTML(l.name)} · ${escapeHTML(getStage(l.stage).short)}</b><span>${escapeHTML(l.nextAction||'Sem próxima ação')} · último movimento ${fmtDateTime(lastLeadActivity(l))}</span></div>`).join('') || '<div class="empty">Sem leads parados.</div>'}</div></div><div class="card"><h3>Clientes sem comunicação</h3><div class="timeline">${overdueClients.map(x=>`<div class="event"><b>${escapeHTML(x.lead.name)}</b><span>Última comunicação: ${fmtDateTime(lastClientCommunication(x.lead))}</span></div>`).join('') || '<div class="empty">Nenhum cliente acima de 30 dias sem comunicação.</div>'}</div></div></div>`; }
    function dashboardAlerts(){ const leadsNoOwner=projectLeads().filter(l=>!l.sdrId||(stageIndex(l.stage)>=4&&!l.corretorId)); const expiredLots=projectLots().filter(l=>['prioridade','pre-reserva'].includes(l.status)&&l.blockedUntil&&new Date(l.blockedUntil)<new Date()); const overdue=projectPayments().filter(p=>paymentStatus(p)==='vencido'); const stalled=projectLeads().filter(isLeadStalled); const silent=projectClients().filter(x=>clientCommunicationOverdue(x.lead)); const items=[]; if(stalled.length) items.push(`<div class="event"><b>${stalled.length} lead(s) parado(s)</b><span>Retomar follow-up ou redistribuir responsável.</span></div>`); if(silent.length) items.push(`<div class="event"><b>${silent.length} cliente(s) sem comunicação há mais de 30 dias</b><span>Enviar informativo, diário de obra ou check-in.</span></div>`); if(leadsNoOwner.length) items.push(`<div class="event"><b>${leadsNoOwner.length} lead(s) sem dono adequado</b><span>Regularize SDR/corretor.</span></div>`); if(expiredLots.length) items.push(`<div class="event"><b>${expiredLots.length} bloqueio(s) vencido(s)</b><span>Libere ou converta em contrato.</span></div>`); if(overdue.length) items.push(`<div class="event"><b>${overdue.length} parcela(s) vencida(s)</b><span>Acionar régua preventiva de cobrança.</span></div>`); if(!items.length) return `<div class="empty">Nenhum alerta crítico neste momento.</div>`; return `<div class="timeline">${items.join('')}</div>`; }
    function savePerson(id){ const projectIds=[...document.querySelectorAll('.personProject:checked')].map(el=>el.value); if(!projectIds.length) return showToast('Vincule ao menos um empreendimento.'); const role=v('personRole'), personName=normalizeHumanName(v('personName')); const file=document.getElementById('personCreciDoc')?.files?.[0]; const existing=id?state.team.find(x=>x.id===id):null; if(role==='Corretor'){ if(!v('personCreci')) return showToast('CRECI é obrigatório para corretores.'); if(!file && !(existing&&existing.creciDoc)) return showToast('Anexe o documento CRECI em PDF.'); if(file && file.type && !file.type.includes('pdf')) return showToast('O documento do CRECI deve ser PDF.'); } const apply=(creciDoc)=>{ if(id){ Object.assign(existing,{name:personName,role,squad:v('personSquad'),email:v('personEmail'),phone:v('personPhone'),creci:v('personCreci'),creciDoc:creciDoc||existing.creciDoc,projectIds,permissions:permissionsFor(role)}); } else { state.team.push({id:uid('usr'),name:personName,role,squad:v('personSquad'),email:v('personEmail'),phone:v('personPhone'),creci:v('personCreci'),creciDoc,active:true,projectIds,permissions:permissionsFor(role),createdAt:nowISO()}); } save(); closeModal(); render(); showToast('Pessoa salva.'); }; if(file){ const reader=new FileReader(); reader.onload=()=>apply({name:file.name,mime:file.type,dataUrl:reader.result,uploadedAt:nowISO()}); reader.readAsDataURL(file); } else apply(null); }
    function openPersonForm(id=''){ const t=id?state.team.find(x=>x.id===id):null; const selectedProjects=t?t.projectIds:[projectId()]; const body=`<div class="formGrid">${inputVal('Nome','personName',t?t.name:'')}${select('Função','personRole',ROLES.map(r=>[r,r]),t?t.role:'SDR')}${inputVal('Squad','personSquad',t?t.squad:'Digital')}${inputVal('E-mail','personEmail',t?t.email:'')}${inputVal('WhatsApp','personPhone',t?t.phone:'')}${inputVal('CRECI','personCreci',t?t.creci:'')}<div class="field span3 brokerDoc"><label>Documento CRECI em PDF (obrigatório para corretor)</label><input type="file" id="personCreciDoc" accept="application/pdf"><div class="tiny">${t&&t.creciDoc?'Documento já anexado: '+escapeHTML(t.creciDoc.name):'Nenhum documento anexado.'}</div></div><div class="field span3"><label>Empreendimentos vinculados</label><div class="catalogList">${state.projects.map(p=>`<label class="chip"><input type="checkbox" class="personProject" value="${p.id}" ${selectedProjects.includes(p.id)?'checked':''}> ${escapeHTML(p.name)}</label>`).join('')}</div></div><div class="field span3"><button class="btn primary" onclick="savePerson('${id}')">Salvar pessoa</button></div></div>`; openModal(id?'Editar pessoa':'Nova pessoa','Corretores exigem CRECI e documento em PDF.',body,'wide'); }
    function renderRelatorios(){ const a=analytics(); const byOrigin=state.origins.map(o=>{ const leads=a.leads.filter(l=>l.originId===o.id); return {name:o.name,leads:leads.length, a:leads.filter(l=>l.score>=80).length, adv:leads.filter(l=>stageIndex(l.stage)>=stageIndex('prioridade')).length};}).filter(x=>x.leads); const byCampaign=state.campaigns.map(c=>{ const leads=a.leads.filter(l=>l.campaignId===c.id); return {name:c.name,leads:leads.length,a:leads.filter(l=>l.score>=80).length,adv:leads.filter(l=>stageIndex(l.stage)>=stageIndex('prioridade')).length};}).filter(x=>x.leads); const byBroker=projectTeam('Corretor').map(c=>{ const leads=a.leads.filter(l=>l.corretorId===c.id); return {name:c.name, leads:leads.length, proposals:projectProposals().filter(p=>p.createdBy===c.id).length, contracts:projectContracts().filter(ct=>leadById(ct.leadId)?.corretorId===c.id).length};}); const stock=LOT_STATUS.map(s=>({name:lotStatusLabel(s), n:a.lots.filter(l=>l.status===s).length})); const table=(rows,cols)=>`<div class="reportTable"><table><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${escapeHTML(r[c[1]]??'')}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" class="muted">Sem dados.</td></tr>`}</tbody></table></div>`; return `<div class="reportGrid"><div class="card"><h3>Relatório por origem</h3>${table(byOrigin,[['Origem','name'],['Leads','leads'],['Clientes A','a'],['Prioridade+','adv']])}</div><div class="card"><h3>Relatório por campanha</h3>${table(byCampaign,[['Campanha','name'],['Leads','leads'],['Clientes A','a'],['Prioridade+','adv']])}</div><div class="card"><h3>Corretores</h3>${table(byBroker,[['Corretor','name'],['Leads','leads'],['Propostas','proposals'],['Contratos','contracts']])}</div><div class="card"><h3>Estoque</h3>${table(stock,[['Status','name'],['Lotes','n']])}</div><div class="card"><h3>Alertas</h3><p><b>${projectLeads().filter(isLeadStalled).length}</b> leads parados<br><b>${projectClients().filter(x=>clientCommunicationOverdue(x.lead)).length}</b> clientes sem comunicação 30+ dias<br><b>${projectPayments().filter(p=>paymentStatus(p)==='vencido').length}</b> parcelas vencidas</p></div><div class="card"><h3>Carteira</h3><p><b>Recebido:</b> ${fmtMoney(a.recebidos)}<br><b>A receber:</b> ${fmtMoney(a.aReceber)}<br><b>Vencido:</b> ${fmtMoney(a.vencidos)}<br><b>Carteira potencial:</b> ${fmtMoney(a.carteira)}</p></div></div>`; }
    const _oldRenderView323 = renderView; renderView = function(){ const views={dashboard:renderDashboard,sdr:renderSdrPanel,corretor:renderCorretorPanel,leads:renderLeads,funil:renderFunil,mapa:renderMapa,simulador:renderSimulador,propostas:renderPropostas,aprovacoes:renderAprovacoes,checklists:renderChecklists,contratos:renderContratos,clientes:renderClientes,financeiro:renderFinanceiro,relatorios:renderRelatorios,equipe:renderEquipe,materiais:renderMateriais,cadastros:renderCadastros,integracoes:renderIntegracoes,assistente:renderAssistente,versoes:renderVersoes}; return (views[view]||renderDashboard)(); };
    const _oldRenderSidebar323 = renderSidebar; renderSidebar = function(){ const html=_oldRenderSidebar323(); return html.replace("['versoes','Versões']", "['relatorios','Relatórios'],['versoes','Versões']").replace('<div class="nav">','<div class="nav">'); };
    const _oldRenderTopbar323 = renderTopbar; renderTopbar = function(){ if(view==='relatorios') return `<div class="topbar"><div class="title"><h2>Relatórios</h2><p>Indicadores por origem, campanha, corretor, estoque, alertas, carteira e inadimplência.</p></div><div class="actions"><button class="btn" onclick="exportCSV()">Exportar Leads CSV</button></div></div>`; return _oldRenderTopbar323(); };
    window.openReserveLot=openReserveLot; window.saveLotReservation=saveLotReservation; window.attachLeadDocument=attachLeadDocument; window.downloadLeadDocument=downloadLeadDocument; window.saveStageNote=saveStageNote;
    window.renderRelatorios=renderRelatorios;
    /* ==== v3.2.3 patch end ==== */


    render();
  })();
</script>
